name: Release to PyPI

on:
  push:
    tags:
    - 'v*'

jobs:
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.x"

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install build

    - name: Build package
      run: python -m build

    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

  mcp-publish:
    name: Publish to MCP Registry
    needs: pypi-publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Install mcp-publisher
      run: |
        curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

    - name: Set version in server.json from tag
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp && mv server.tmp server.json
        echo "server.json now points at version $VERSION"

    - name: Wait for PyPI to index the new release
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        for i in 1 2 3 4 5 6; do
          if curl -sf "https://pypi.org/pypi/Flyan/${VERSION}/json" > /dev/null; then
            echo "PyPI has Flyan ${VERSION}"
            exit 0
          fi
          echo "Waiting for PyPI to index Flyan ${VERSION} (attempt ${i}/6)..."
          sleep 10
        done
        echo "PyPI did not surface the version in time; publish anyway and let the Registry retry"

    - name: Authenticate to MCP Registry via OIDC
      run: ./mcp-publisher login github-oidc

    - name: Publish server to MCP Registry
      run: ./mcp-publisher publish
