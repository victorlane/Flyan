[project]
name = "Flyan"
version = "0.2.0"
description = "Open source unofficial API wrappper to get flight data from RyanAir."
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "httpx>=0.27.2",
    "pydantic>=2.9.2",
    "tenacity>=9.0.0",
]

[project.optional-dependencies]
mcp = ["mcp>=1.0.0"]

[project.scripts]
flyan-mcp = "flyan.mcp_server:main"
